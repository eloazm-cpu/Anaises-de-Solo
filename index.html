<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Coleta de Solo - Ecobhio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        eco: {
                            green: '#74A629',
                            dark: '#0B2046',
                            light: '#F4F7F2',
                            yellow: '#F2C200'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .checkbox-round { width:1.5em;height:1.5em;background-color:white;border-radius:50%;vertical-align:middle;border:2px solid #cbd5e1;appearance:none;-webkit-appearance:none;outline:none;cursor:pointer;position:relative;transition:all 0.2s ease-in-out; }
        .checkbox-round:checked { background-color:#74A629;border-color:#74A629; }
        .checkbox-round:checked::after { content:'\2714';font-size:14px;color:white;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%); }
        @keyframes crushDown { 0%,100%{transform:translateY(-20px)}40%,60%{transform:translateY(10px)} }
        @keyframes clodBreak { 0%,30%{transform:scale(1);opacity:1}40%,60%{transform:scale(1.2);opacity:0}70%,100%{transform:scale(0);opacity:0} }
        @keyframes particlesShow { 0%,30%{opacity:0;transform:scale(0)}40%,100%{opacity:1;transform:scale(1)} }
        @keyframes tiltSpade { 0%,100%{transform:rotate(0deg)}30%,70%{transform:rotate(-35deg) translate(-10px,10px)} }
        @keyframes dirtDrop { 0%,30%{opacity:0;transform:translateY(-10px)}40%,60%{opacity:1;transform:translateY(30px)}70%,100%{opacity:0;transform:translateY(40px)} }
        @keyframes fillUp { 0%,30%{height:10%}70%,100%{height:80%} }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-100 p-5 h-full ${className}`}>{children}</div>
        );

        const IconBox = ({ icon, label, qty, obs }) => (
            <div className="flex flex-col items-center p-4 bg-slate-50 rounded-lg border border-slate-200 text-center hover:shadow-md transition-shadow h-full justify-center">
                <div className="w-16 h-16 rounded-full bg-eco-dark flex items-center justify-center mb-3 shadow-inner shrink-0">
                    <i className={`ph ${icon} text-3xl text-white`}></i>
                </div>
                <h4 className="font-bold text-slate-800 leading-tight">{label}</h4>
                {qty && <span className="text-sm font-semibold text-eco-green mt-1">Qtd. {qty}</span>}
                {obs && <p className="text-xs text-slate-500 mt-1 leading-tight">{obs}</p>}
            </div>
        );

        const AnimHomogeneizacao = () => (
            <div className="relative rounded-xl overflow-hidden shadow-sm border border-slate-200 bg-white w-full max-w-[280px] mx-auto h-48 md:h-full md:min-h-[200px] flex items-center justify-center z-10">
                <span className="absolute top-2 left-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ilustração</span>
                <div className="w-32 h-32 border-4 border-slate-200 rounded-lg relative flex items-center justify-center bg-slate-50">
                    <div className="absolute -top-4 w-28 h-6 border-4 border-slate-200 rounded-t-lg bg-slate-50 border-b-0"></div>
                    <div className="w-12 h-10 bg-[#8b5a2b] rounded-full absolute" style={{ animation: 'clodBreak 3s infinite' }}></div>
                    <div className="absolute flex flex-wrap justify-center w-20 gap-1" style={{ animation: 'particlesShow 3s infinite' }}>
                        {[...Array(8)].map((_, i) => (<div key={i} className="w-3 h-3 bg-[#6c421b] rounded-sm"></div>))}
                    </div>
                </div>
                <div className="absolute z-10 text-eco-dark drop-shadow-lg" style={{ animation: 'crushDown 3s infinite' }}>
                    <i className="ph-fill ph-hand-palm text-6xl"></i>
                </div>
            </div>
        );

        const AnimPreenchimentoTubo = () => (
            <div className="relative rounded-xl overflow-hidden shadow-sm border border-slate-200 bg-white w-full max-w-[280px] mx-auto h-48 md:h-full md:min-h-[200px] flex items-center justify-center z-10">
                <span className="absolute top-2 left-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ilustração</span>
                <div className="relative w-10 h-28 border-4 border-b-[8px] border-slate-300 rounded-b-xl border-t-0 flex items-end justify-center pb-1">
                    <div className="absolute -top-2 w-12 h-3 bg-blue-400 rounded-sm"></div>
                    <div className="w-full bg-[#6c421b] rounded-b-md transition-all" style={{ animation: 'fillUp 3s infinite' }}></div>
                </div>
                <div className="absolute top-4 right-16 flex flex-col items-center">
                    <div className="origin-bottom-right" style={{ animation: 'tiltSpade 3s infinite' }}>
                        <i className="ph-fill ph-shovel text-5xl text-slate-600 transform -rotate-45"></i>
                    </div>
                    <div className="absolute top-8 right-6 w-3 h-3 bg-[#8b5a2b] rounded-full" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                    <div className="absolute top-10 right-4 w-2 h-2 bg-[#6c421b] rounded-full" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                    <div className="absolute top-12 right-8 w-2 h-2 bg-[#8b5a2b] rounded-full" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                </div>
            </div>
        );

        const IntroScreen = () => (
            <div className="space-y-6 animate-fade-in max-w-5xl mx-auto w-full">
                <div className="bg-eco-green text-white p-6 md:p-10 rounded-2xl shadow-lg relative overflow-hidden flex flex-col md:flex-row md:items-center justify-between z-10">
                    <div className="relative z-20 md:w-2/3">
                        <h2 className="text-2xl md:text-4xl font-bold mb-3 flex items-center">Protocolo de Coleta de Solo <span className="ml-2 text-3xl md:text-4xl">🍈</span></h2>
                        <p className="text-sm md:text-base opacity-90 mb-4 md:mb-6 text-justify md:text-left max-w-2xl">Este guia apresenta o protocolo para coleta de solo da <strong>cultura do Melão</strong>, comparando a área tratada com Ecobhio e a área conduzida no padrão da fazenda. O objetivo é avaliar alterações na microbiota por <strong>Metagenômica</strong> e <strong>qPCR</strong>.</p>
                        <div className="bg-white/20 p-3 md:p-4 rounded-lg backdrop-blur-sm border border-white/30 text-sm inline-block">
                            <i className="ph ph-target mr-2"></i>Comparativo: <strong>Área Tratada Ecobhio</strong> × <strong>Área Padrão Fazenda</strong>
                        </div>
                    </div>
                    <div className="hidden md:block relative z-10 w-1/3 text-right"><i className="ph ph-plant text-9xl opacity-20"></i></div>
                    <i className="ph ph-plant absolute -right-4 -bottom-4 text-8xl opacity-10 md:hidden z-0"></i>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                    <div className="space-y-6 flex flex-col h-full">
                        <Card className="flex-grow">
                            <h3 className="font-bold text-eco-dark text-lg md:text-xl mb-4 border-b pb-2 flex items-center"><i className="ph ph-map-pin-line mr-2 text-eco-green"></i> Áreas Avaliadas e Épocas de Coleta</h3>
                            <p className="text-slate-600 text-sm md:text-base mb-3 text-justify">Serão avaliadas duas áreas: <strong>Área Ecobhio</strong> (com tratamento) e <strong>Área Padrão Fazenda</strong> (sem tratamento). As coletas ocorrem em dois momentos:</p>
                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <div className="bg-blue-50 border border-blue-200 p-3 rounded-lg text-center shadow-sm">
                                    <div className="font-bold text-blue-700 text-base mb-1">T0</div>
                                    <div className="text-[11px] text-blue-700 font-medium leading-tight">Antes da aplicação<br/>dos tratamentos</div>
                                </div>
                                <div className="bg-orange-50 border border-orange-200 p-3 rounded-lg text-center shadow-sm">
                                    <div className="font-bold text-orange-700 text-base mb-1">T1</div>
                                    <div className="text-[11px] text-orange-700 font-medium leading-tight">15 a 20 dias após<br/>a aplicação Ecobhio</div>
                                </div>
                            </div>
                            <p className="text-slate-600 text-sm md:text-base mb-4 text-justify">Para cada área e época, será retirada <strong>1 amostra composta</strong> por tipo de análise, formada por <strong>10 a 15 subamostras</strong> distribuídas representativamente.</p>
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                <div className="bg-green-50 border border-green-200 p-3 md:p-4 rounded-lg text-center flex flex-col justify-center shadow-sm">
                                    <div className="font-bold text-green-700 text-lg md:text-xl mb-1">1 Amostra</div>
                                    <div className="text-[11px] md:text-xs text-green-700 font-medium leading-tight">Área Tratada<br/>(Produtos Ecobhio)</div>
                                </div>
                                <div className="bg-slate-100 border border-slate-200 p-3 md:p-4 rounded-lg text-center flex flex-col justify-center shadow-sm">
                                    <div className="font-bold text-slate-700 text-lg md:text-xl mb-1">1 Amostra</div>
                                    <div className="text-[11px] md:text-xs text-slate-600 font-medium leading-tight">Área Padrão Fazenda<br/>(Sem Tratamento)</div>
                                </div>
                            </div>
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                                <div className="mb-3 flex items-center justify-between">
                                    <span className="font-bold text-xs md:text-sm text-slate-700 uppercase tracking-wide">Produtividade</span>
                                    <div className="w-1/2 relative pt-2">
                                        <div className="absolute top-0 left-0 w-full flex items-center"><div className="h-[2px] bg-slate-800 w-full"></div><div className="w-0 h-0 border-y-[4px] border-y-transparent border-l-[6px] border-l-slate-800 -ml-1"></div></div>
                                        <div className="flex h-3 md:h-4 w-full rounded-sm overflow-hidden border border-slate-300 shadow-sm mt-1"><div className="flex-1 bg-[#ff0000]"></div><div className="flex-1 bg-[#ffff00]"></div><div className="flex-1 bg-[#ccff33]"></div><div className="flex-1 bg-[#33cc33]"></div><div className="flex-1 bg-[#006600]"></div></div>
                                    </div>
                                </div>
                                <div className="w-full h-40 md:h-48 rounded-lg border-2 border-slate-300 overflow-hidden relative shadow-sm z-10" style={{background:'radial-gradient(ellipse at 15% 15%, #ff0000 0%, #ff6600 25%, transparent 50%), radial-gradient(ellipse at 85% 85%, #ff0000 0%, #ffff00 35%, transparent 60%), linear-gradient(135deg, #ccff33 0%, #33cc33 50%, #006600 100%)'}}>
                                    <div className="absolute top-1/4 left-1/3 w-1/2 h-1/2 bg-[#33cc33] blur-xl opacity-60 rounded-full"></div>
                                </div>
                            </div>
                        </Card>
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 md:p-6 rounded-lg shadow-sm">
                            <h4 className="font-bold text-blue-900 text-sm md:text-base mb-2 flex items-center"><i className="ph ph-ruler text-lg md:text-xl mr-2"></i> Profundidades de Coleta</h4>
                            <div className="space-y-2">
                                <div className="flex items-center bg-white p-2 rounded border border-blue-100">
                                    <span className="w-3 h-3 rounded-full bg-blue-500 mr-2 shrink-0"></span>
                                    <span className="text-xs md:text-sm text-blue-800"><strong>Metagenômica:</strong> 0 a 10 cm de profundidade</span>
                                </div>
                                <div className="flex items-center bg-white p-2 rounded border border-blue-100">
                                    <span className="w-3 h-3 rounded-full bg-blue-700 mr-2 shrink-0"></span>
                                    <span className="text-xs md:text-sm text-blue-800"><strong>qPCR (alvos específicos):</strong> 0 a 15 cm de profundidade</span>
                                </div>
                            </div>
                            <p className="text-xs text-blue-700 mt-2">Os mesmos pontos georreferenciados devem ser revisitados em T0 e T1.</p>
                        </div>
                        <div className="bg-eco-light border-l-4 border-eco-green p-4 md:p-6 rounded-lg shadow-sm">
                            <h4 className="font-bold text-eco-dark text-sm md:text-base mb-3 flex items-center"><i className="ph ph-map-pin text-lg md:text-xl mr-2 text-eco-green"></i> Envio das Amostras ao Laboratório</h4>
                            <p className="text-xs md:text-sm text-slate-700 mb-3">Após a coleta, mantenha as amostras refrigeradas e envie o quanto antes ao laboratório no endereço abaixo:</p>
                            <div className="bg-white rounded-lg border border-eco-green/30 p-3 flex items-start gap-3 shadow-sm">
                                <i className="ph-fill ph-map-pin-area text-eco-green text-2xl shrink-0 mt-0.5"></i>
                                <div>
                                    <p className="font-bold text-eco-dark text-sm">Laboratório — Endereço para Envio</p>
                                    <p className="text-slate-600 text-xs mt-0.5 leading-relaxed">Rua Imaculada Conceição, 1430<br/>Prado Velho — Curitiba / PR</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <Card>
                        <h3 className="font-bold text-eco-dark text-lg md:text-xl mb-4 border-b pb-2">Como acontecem as análises</h3>
                        <div className="flex flex-col space-y-4 md:space-y-6 relative">
                            <div className="absolute left-4 top-2 bottom-2 w-0.5 bg-eco-green/30 z-0"></div>
                            {[
                                { step:1, title:"Kit de Coleta", icon:"ph-package" },
                                { step:2, title:"Coleta da Amostra", desc:"Amostragem da comunidade microbiana (Ecobhio x Padrão)", icon:"ph-flask", visual:"map" },
                                { step:3, title:"Processamento", desc:"Extração do DNA", icon:"ph-dna" },
                                { step:4, title:"Sequenciamento Genético", desc:"Decodificação da diversidade genética", icon:"ph-activity", visual:"dna-seq" },
                                { step:5, title:"Laudo e Recomendação", desc:"Interpretação dos resultados e Recomendação ECOBHIO", icon:"ph-file-text", visual:"dashboard" }
                            ].map((item) => (
                                <div key={item.step} className="flex items-start relative z-10">
                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-eco-green text-white flex items-center justify-center font-bold text-sm md:text-base shrink-0 shadow-md">{item.step}</div>
                                    <div className="ml-4 bg-slate-50 p-3 md:p-4 rounded-lg border border-slate-100 w-full flex flex-col justify-center">
                                        <div className="flex items-center">
                                            <i className={`ph ${item.icon} text-2xl md:text-3xl text-eco-dark mr-3 opacity-70`}></i>
                                            <div>
                                                <div className="font-bold text-sm md:text-base text-slate-800">{item.title}</div>
                                                {item.desc && <div className="text-xs md:text-sm text-slate-500 mt-0.5 leading-tight">{item.desc}</div>}
                                            </div>
                                        </div>
                                        {item.visual === 'map' && (
                                            <div className="mt-3 relative w-full h-32 md:h-40 bg-[#8c949e] rounded-lg overflow-hidden border-2 border-slate-300 shadow-inner">
                                                <div className="absolute top-0 w-full bg-[#1e293b] text-center text-[10px] text-white py-0.5 font-bold z-10">Talhão 405</div>
                                                {[{id:1,top:'80%',left:'85%'},{id:2,top:'65%',left:'85%'},{id:3,top:'50%',left:'85%'},{id:4,top:'35%',left:'85%'},{id:5,top:'20%',left:'85%'},{id:6,top:'85%',left:'60%'},{id:7,top:'82%',left:'40%'},{id:8,top:'80%',left:'25%'},{id:9,top:'80%',left:'10%'}].map(pin => (
                                                    <div key={pin.id} className="absolute flex flex-col items-center transform -translate-x-1/2 -translate-y-full" style={{top:pin.top,left:pin.left}}>
                                                        <div className="w-3.5 h-3.5 bg-yellow-400 rounded-full flex items-center justify-center text-[7px] font-bold text-slate-900 border border-white shadow-sm">{pin.id}</div>
                                                        <div className="w-0 h-0 border-l-[3px] border-l-transparent border-t-[4px] border-t-yellow-400 border-r-[3px] border-r-transparent"></div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {item.visual === 'dna-seq' && (
                                            <div className="mt-3 bg-white p-2 border border-slate-200 rounded flex items-center justify-around h-12 shadow-inner">
                                                <i className="ph ph-hard-drives text-2xl text-slate-400"></i>
                                                <i className="ph ph-arrow-right text-eco-green"></i>
                                                <div className="flex flex-col items-center">
                                                    <div className="flex space-x-1"><div className="w-2 h-4 bg-blue-300 rounded-sm"></div><div className="w-2 h-4 bg-green-300 rounded-sm"></div><div className="w-2 h-4 bg-yellow-300 rounded-sm"></div><div className="w-2 h-4 bg-red-300 rounded-sm"></div></div>
                                                    <span className="text-[6px] text-slate-400 mt-0.5 font-bold uppercase tracking-wider">Genes</span>
                                                </div>
                                            </div>
                                        )}
                                        {item.visual === 'dashboard' && (
                                            <div className="mt-3 flex space-x-2">
                                                {[1,2].map(board => (
                                                    <div key={board} className="flex-1 bg-white border border-slate-200 rounded shadow-sm p-2 flex flex-col space-y-1.5">
                                                        <div className="h-1.5 w-1/3 bg-slate-300 rounded mb-1"></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div><div className="h-1 w-full bg-blue-100 rounded overflow-hidden"><div className="h-full bg-blue-500 rounded" style={{width:'60%'}}></div></div></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-green-500 shrink-0"></div><div className="h-1 w-full bg-green-100 rounded overflow-hidden"><div className="h-full bg-green-500 rounded" style={{width:'85%'}}></div></div></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></div><div className="h-1 w-full bg-red-100 rounded overflow-hidden"><div className="h-full bg-red-500 rounded" style={{width:'40%'}}></div></div></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-purple-500 shrink-0"></div><div className="h-1 w-full bg-purple-100 rounded overflow-hidden"><div className="h-full bg-purple-500 rounded" style={{width:'70%'}}></div></div></div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>
                </div>
            </div>
        );

        const MaterialsScreen = () => {
            const [checkedItems, setCheckedItems] = useState({});
            const toggleItem = (id) => setCheckedItems(prev => ({...prev, [id]: !prev[id]}));
            return (
                <div className="space-y-6 max-w-5xl mx-auto w-full">
                    <h2 className="text-xl md:text-2xl font-bold text-eco-dark flex items-center"><i className="ph ph-toolbox mr-2 text-eco-green text-3xl"></i> Kit e Materiais</h2>
                    <Card>
                        <h3 className="font-bold text-slate-700 mb-4 text-sm md:text-base uppercase tracking-wide">Fornecidos no Kit Ecobhio</h3>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                            <IconBox icon="ph-bag" label="Sacos" qty="24" obs="Ponto 1 ao 15 por tratamento" />
                            <IconBox icon="ph-shovel" label="Pá Dosadora" qty="1" />
                            <IconBox icon="ph-hand-palm" label="Par de Luvas" qty="1" obs="Descartável" />
                            <IconBox icon="ph-flask" label="Tubo Cônico" qty="24" obs="50ml" />
                            <IconBox icon="ph-flag" label="Bandeiras" qty="24" obs="Identificação" />
                        </div>
                    </Card>
                    <Card>
                        <h3 className="font-bold text-slate-700 mb-3 text-sm md:text-base uppercase tracking-wide">Providenciar (Ferramentas de Corte)</h3>
                        <p className="text-xs md:text-sm text-slate-500 mb-4">Selecione o que você tem à disposição:</p>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                            {[{id:'t-rosca',label:'Trado de Rosca',img:'ph-spiral'},{id:'t-calador',label:'Trado Calador',img:'ph-needle'},{id:'t-holandes',label:'Trado Holandês',img:'ph-anchor'},{id:'pa',label:'Pá Reta / Pá de corte',img:'ph-shovel'},{id:'enxadao',label:'Enxadão',img:'ph-pickaxe'},{id:'balde',label:'Balde Limpo',img:'ph-bucket'}].map(tool => (
                                <label key={tool.id} className={`flex items-center p-3 md:p-4 rounded-lg border cursor-pointer transition-colors ${checkedItems[tool.id] ? 'bg-green-50 border-green-300 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <input type="checkbox" className="checkbox-round mr-4 shrink-0" checked={!!checkedItems[tool.id]} onChange={() => toggleItem(tool.id)} />
                                    <i className={`ph ${tool.img} text-2xl mr-3 ${checkedItems[tool.id] ? 'text-eco-green' : 'text-slate-400'}`}></i>
                                    <span className={`font-medium text-sm md:text-base ${checkedItems[tool.id] ? 'text-eco-dark' : 'text-slate-600'}`}>{tool.label}</span>
                                </label>
                            ))}
                        </div>
                    </Card>
                </div>
            );
        };

        const WarningsScreen = () => (
            <div className="space-y-6 max-w-5xl mx-auto w-full">
                <h2 className="text-xl md:text-2xl font-bold text-eco-dark flex items-center mb-6"><i className="ph ph-shield-warning mr-2 text-eco-green text-3xl"></i> Recomendações e Cuidados</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                    <div className="bg-red-50 border-l-4 lg:border-l-0 lg:border-t-4 border-red-500 p-5 rounded-r-lg lg:rounded-b-lg lg:rounded-t-none shadow-sm flex lg:flex-col items-start lg:items-center text-left lg:text-center h-full">
                        <i className="ph ph-hand-x text-4xl text-red-500 mr-4 lg:mr-0 lg:mb-3 shrink-0"></i>
                        <div><h4 className="font-bold text-red-900 text-sm md:text-base mb-2">Pontos Atípicos</h4><p className="text-xs md:text-sm text-red-800">Evitar coleta em carreadores, bordaduras, manchas de encharcamento, falhas de plantio ou acúmulo de matéria orgânica.</p></div>
                    </div>
