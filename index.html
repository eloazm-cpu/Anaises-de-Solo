<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Coleta de Solo - Ecobhio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        eco: {
                            green: '#74A629', // Verde logotipo Ecobhio
                            dark: '#0B2046',  // Azul escuro logotipo
                            light: '#F4F7F2',
                            yellow: '#F2C200'
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Checkbox */
        .checkbox-round {
            width: 1.5em;
            height: 1.5em;
            background-color: white;
            border-radius: 50%;
            vertical-align: middle;
            border: 2px solid #cbd5e1;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease-in-out;
        }
        .checkbox-round:checked {
            background-color: #74A629;
            border-color: #74A629;
        }
        .checkbox-round:checked::after {
            content: '\2714';
            font-size: 14px;
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Zig Zag Line for CSS */
        .zig-zag-path {
            border-left: 3px dashed #74A629;
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            z-index: 0;
        }

        /* Animações Customizadas */
        @keyframes crushDown {
            0%, 100% { transform: translateY(-20px); }
            40%, 60% { transform: translateY(10px); }
        }
        @keyframes clodBreak {
            0%, 30% { transform: scale(1); opacity: 1; }
            40%, 60% { transform: scale(1.2); opacity: 0; }
            70%, 100% { transform: scale(0); opacity: 0; }
        }
        @keyframes particlesShow {
            0%, 30% { opacity: 0; transform: scale(0); }
            40%, 100% { opacity: 1; transform: scale(1); }
        }
        @keyframes tiltSpade {
            0%, 100% { transform: rotate(0deg); }
            30%, 70% { transform: rotate(-35deg) translate(-10px, 10px); }
        }
        @keyframes dirtDrop {
            0%, 30% { opacity: 0; transform: translateY(-10px); }
            40%, 60% { opacity: 1; transform: translateY(30px); }
            70%, 100% { opacity: 0; transform: translateY(40px); }
        }
        @keyframes fillUp {
            0%, 30% { height: 10%; }
            70%, 100% { height: 80%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTES REUTILIZÁVEIS ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-100 p-5 h-full ${className}`}>
                {children}
            </div>
        );

        const IconBox = ({ icon, label, qty, obs, iconColor="text-eco-dark" }) => (
            <div className="flex flex-col items-center p-4 bg-slate-50 rounded-lg border border-slate-200 text-center hover:shadow-md transition-shadow h-full justify-center">
                <div className={`w-16 h-16 rounded-full bg-eco-dark flex items-center justify-center mb-3 shadow-inner shrink-0`}>
                    <i className={`ph ${icon} text-3xl text-white`}></i>
                </div>
                <h4 className="font-bold text-slate-800 leading-tight">{label}</h4>
                {qty && <span className="text-sm font-semibold text-eco-green mt-1">Qtd. {qty}</span>}
                {obs && <p className="text-xs text-slate-500 mt-1 leading-tight">{obs}</p>}
            </div>
        );

        // --- ANIMAÇÕES ILUSTRATIVAS (CSS) ---
        const AnimHomogeneizacao = () => (
            <div className="relative rounded-xl overflow-hidden shadow-sm border border-slate-200 bg-white w-full max-w-[280px] mx-auto h-48 md:h-full md:min-h-[200px] flex items-center justify-center z-10">
                <span className="absolute top-2 left-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ilustração</span>
                
                {/* Saco Plástico */}
                <div className="w-32 h-32 border-4 border-slate-200 rounded-lg relative flex items-center justify-center bg-slate-50">
                    <div className="absolute -top-4 w-28 h-6 border-4 border-slate-200 rounded-t-lg bg-slate-50 border-b-0"></div>
                    
                    {/* Torrão */}
                    <div className="w-12 h-10 bg-[#8b5a2b] rounded-full absolute" style={{ animation: 'clodBreak 3s infinite' }}></div>
                    
                    {/* Partículas (Solo quebrado) */}
                    <div className="absolute flex flex-wrap justify-center w-20 gap-1" style={{ animation: 'particlesShow 3s infinite' }}>
                        {[...Array(8)].map((_, i) => (
                            <div key={i} className="w-3 h-3 bg-[#6c421b] rounded-sm"></div>
                        ))}
                    </div>
                </div>

                {/* Mão (Fora do saco) */}
                <div className="absolute z-10 text-eco-dark drop-shadow-lg" style={{ animation: 'crushDown 3s infinite' }}>
                    <i className="ph-fill ph-hand-palm text-6xl"></i>
                </div>
            </div>
        );

        const AnimPreenchimentoTubo = () => (
            <div className="relative rounded-xl overflow-hidden shadow-sm border border-slate-200 bg-white w-full max-w-[280px] mx-auto h-48 md:h-full md:min-h-[200px] flex items-center justify-center z-10">
                <span className="absolute top-2 left-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ilustração</span>
                
                {/* Tubo Cônico */}
                <div className="relative w-10 h-28 border-4 border-b-[8px] border-slate-300 rounded-b-xl border-t-0 flex items-end justify-center pb-1">
                    <div className="absolute -top-2 w-12 h-3 bg-blue-400 rounded-sm"></div>
                    {/* Nível de Terra subindo */}
                    <div className="w-full bg-[#6c421b] rounded-b-md transition-all" style={{ animation: 'fillUp 3s infinite' }}></div>
                </div>

                {/* Pá Dosadora e Terra caindo */}
                <div className="absolute top-4 right-16 flex flex-col items-center">
                    <div className="origin-bottom-right" style={{ animation: 'tiltSpade 3s infinite' }}>
                        <i className="ph-fill ph-shovel text-5xl text-slate-600 transform -rotate-45"></i>
                    </div>
                    {/* Terra caindo */}
                    <div className="absolute top-8 right-6 w-3 h-3 bg-[#8b5a2b] rounded-full" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                    <div className="absolute top-10 right-4 w-2 h-2 bg-[#6c421b] rounded-full delay-75" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                    <div className="absolute top-12 right-8 w-2 h-2 bg-[#8b5a2b] rounded-full delay-150" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                </div>
            </div>
        );

        // --- TELAS DO APLICATIVO ---

        // 1. INTRODUÇÃO
        const IntroScreen = () => (
            <div className="space-y-6 animate-fade-in max-w-5xl mx-auto w-full">
                {/* Hero Responsivo */}
                <div className="bg-eco-green text-white p-6 md:p-10 rounded-2xl shadow-lg relative overflow-hidden flex flex-col md:flex-row md:items-center justify-between z-10">
                    <div className="relative z-20 md:w-2/3">
                        <h2 className="text-2xl md:text-4xl font-bold mb-3 flex items-center">
                            Coleta na Rizosfera <span className="ml-2 text-3xl md:text-4xl">🍈</span>
                        </h2>
                        <p className="text-sm md:text-base opacity-90 mb-4 md:mb-6 text-justify md:text-left max-w-2xl">
                            Este guia traz as informações necessárias para realizar a coleta de solo na linha de plantio da <strong>cultura do Melão</strong> e avaliar a microbiota que está em contato direto com a planta.
                        </p>
                        <div className="bg-white/20 p-3 md:p-4 rounded-lg backdrop-blur-sm border border-white/30 text-sm inline-block">
                            <i className="ph ph-target mr-2"></i>
                            É o mais indicado para avaliar o efeito de <strong>bioinsumos</strong> e interações dos microrganismos na rizosfera.
                        </div>
                    </div>
                    <div className="hidden md:block relative z-10 w-1/3 text-right">
                        <i className="ph ph-plant text-9xl opacity-20"></i>
                    </div>
                    {/* Ícone mobile */}
                    <i className="ph ph-plant absolute -right-4 -bottom-4 text-8xl opacity-10 md:hidden z-0"></i>
                </div>

                {/* Grid Responsiva (2 colunas no Desktop) */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                    
                    {/* Coluna Esquerda */}
                    <div className="space-y-6 flex flex-col h-full">
                        <Card className="flex-grow">
                            <h3 className="font-bold text-eco-dark text-lg md:text-xl mb-4 border-b pb-2 flex items-center">
                                <i className="ph ph-map-pin-line mr-2 text-eco-green"></i> Estratégia de Coleta
                            </h3>
                            <p className="text-slate-600 text-sm md:text-base mb-3 text-justify">
                                Para compor a amostra, as coletas deverão ser realizadas em uma área de interesse da empresa. Em cada área avaliada, serão coletadas duas amostras: uma referente ao padrão Fazenda e outra referente ao padrão Ecobhio.
                            </p>
                            <p className="text-slate-600 text-sm md:text-base mb-4 text-justify">
                                Cada amostra deverá ser composta por subamostras coletadas em <strong>15 pontos georreferenciados</strong>, distribuídos de forma representativa dentro da área de interesse. Essa metodologia tem como objetivo garantir maior precisão, rastreabilidade e representatividade dos resultados da análise de solo.
                            </p>
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                <div className="bg-green-50 border border-green-200 p-3 md:p-4 rounded-lg text-center flex flex-col justify-center shadow-sm">
                                    <div className="font-bold text-green-700 text-lg md:text-xl mb-1">1 Amostra</div>
                                    <div className="text-[11px] md:text-xs text-green-700 font-medium leading-tight">Área Tratada<br/>(Produtos Ecobhio)</div>
                                </div>
                                <div className="bg-slate-100 border border-slate-200 p-3 md:p-4 rounded-lg text-center flex flex-col justify-center shadow-sm">
                                    <div className="font-bold text-slate-700 text-lg md:text-xl mb-1">1 Amostra</div>
                                    <div className="text-[11px] md:text-xs text-slate-600 font-medium leading-tight">Área Testemunha<br/>(Padrão Fazenda)</div>
                                </div>
                            </div>

                            {/* Mapa de Produtividade / NDVI */}
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                                <div className="mb-3 flex items-center justify-between">
                                    <span className="font-bold text-xs md:text-sm text-slate-700 uppercase tracking-wide">Produtividade</span>
                                    <div className="w-1/2 relative pt-2">
                                        <div className="absolute top-0 left-0 w-full flex items-center">
                                            <div className="h-[2px] bg-slate-800 w-full"></div>
                                            <div className="w-0 h-0 border-y-[4px] border-y-transparent border-l-[6px] border-l-slate-800 -ml-1"></div>
                                        </div>
                                        <div className="flex h-3 md:h-4 w-full rounded-sm overflow-hidden border border-slate-300 shadow-sm mt-1">
                                            <div className="flex-1 bg-[#ff0000]"></div><div className="flex-1 bg-[#ffff00]"></div><div className="flex-1 bg-[#ccff33]"></div><div className="flex-1 bg-[#33cc33]"></div><div className="flex-1 bg-[#006600]"></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="w-full h-40 md:h-48 rounded-lg border-2 border-slate-300 overflow-hidden relative shadow-sm z-10" style={{
                                    background: 'radial-gradient(ellipse at 15% 15%, #ff0000 0%, #ff6600 25%, transparent 50%), radial-gradient(ellipse at 85% 85%, #ff0000 0%, #ffff00 35%, transparent 60%), linear-gradient(135deg, #ccff33 0%, #33cc33 50%, #006600 100%)'
                                }}>
                                    <div className="absolute inset-0 opacity-10 mix-blend-overlay" style={{ backgroundImage: 'repeating-linear-gradient(0deg, transparent, transparent 2px, #000 2px, #000 4px)' }}></div>
                                    <div className="absolute inset-0 opacity-10 mix-blend-overlay" style={{ backgroundImage: 'repeating-linear-gradient(90deg, transparent, transparent 2px, #000 2px, #000 4px)' }}></div>
                                    <div className="absolute top-1/4 left-1/3 w-1/2 h-1/2 bg-[#33cc33] blur-xl opacity-60 rounded-full"></div>
                                </div>
                            </div>
                        </Card>
                        
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 md:p-6 rounded-lg shadow-sm">
                            <h4 className="font-bold text-blue-900 text-sm md:text-base mb-2 flex items-center">
                                <i className="ph ph-snowflake text-lg md:text-xl mr-2"></i> Armazenamento e Envio
                            </h4>
                            <p className="text-xs md:text-sm text-blue-800 text-justify leading-relaxed">
                                Assim que a amostra for coletada e embalada, ela deve ser acondicionada em <strong>freezer</strong> até o envio e deve ser postada o mais rápido possível para garantir a qualidade do resultado. Nossa indicação é que a amostra não demore mais de <strong>07 dias corridos</strong> para chegar no laboratório, após ter sido coletada. O envio deve ter as mesmas condições da armazenagem, ou seja, se tiver em freezer enviar com <strong>gelox</strong>.
                            </p>
                        </div>
                    </div>

                    {/* Coluna Direita */}
                    <Card>
                        <h3 className="font-bold text-eco-dark text-lg md:text-xl mb-4 border-b pb-2">Como acontecem as análises</h3>
                        <div className="flex flex-col space-y-4 md:space-y-6 relative">
                            <div className="absolute left-4 top-2 bottom-2 w-0.5 bg-eco-green/30 z-0"></div>
                            
                            {[
                                { step: 1, title: "Kit de Coleta", icon: "ph-package" },
                                { step: 2, title: "Coleta da Amostra", desc: "Amostragem da comunidade microbiana (Ecobhio x Padrão)", icon: "ph-flask", visual: "map" },
                                { step: 3, title: "Processamento", desc: "Extração do DNA", icon: "ph-dna" },
                                { step: 4, title: "Sequenciamento Genético", desc: "Decodificação da diversidade genética (Identificação de genes)", icon: "ph-activity", visual: "dna-seq" },
                                { step: 5, title: "Laudo e Recomendação", desc: "Interpretação dos resultados e Recomendação ECOBHIO", icon: "ph-file-text", visual: "dashboard" }
                            ].map((item) => (
                                <div key={item.step} className="flex items-start relative z-10">
                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-eco-green text-white flex items-center justify-center font-bold text-sm md:text-base shrink-0 shadow-md">
                                        {item.step}
                                    </div>
                                    <div className="ml-4 bg-slate-50 p-3 md:p-4 rounded-lg border border-slate-100 w-full flex flex-col justify-center">
                                        <div className="flex items-center">
                                            <i className={`ph ${item.icon} text-2xl md:text-3xl text-eco-dark mr-3 opacity-70`}></i>
                                            <div>
                                                <div className="font-bold text-sm md:text-base text-slate-800">{item.title}</div>
                                                {item.desc && <div className="text-xs md:text-sm text-slate-500 mt-0.5 leading-tight">{item.desc}</div>}
                                            </div>
                                        </div>
                                        
                                        {/* Visualização Condicional */}
                                        {item.visual === 'map' && (
                                            <div className="mt-3 relative w-full h-32 md:h-40 bg-[#8c949e] rounded-lg overflow-hidden border-2 border-slate-300 shadow-inner">
                                                <div className="absolute top-0 w-full bg-[#1e293b] text-center text-[10px] md:text-xs text-white py-0.5 font-bold z-10">Talhão 405</div>
                                                <div className="absolute top-0 bottom-0 left-[60%] w-px bg-white/40 transform rotate-45 origin-top"></div>
                                                <div className="absolute top-0 bottom-0 left-0 w-px bg-white/40 transform -rotate-45 origin-top translate-x-10"></div>
                                                {/* Pins */}
                                                {[
                                                    { id: 1, top: '80%', left: '85%' }, { id: 2, top: '65%', left: '85%' },
                                                    { id: 3, top: '50%', left: '85%' }, { id: 4, top: '35%', left: '85%' },
                                                    { id: 5, top: '20%', left: '85%' }, { id: 6, top: '85%', left: '60%' },
                                                    { id: 7, top: '82%', left: '40%' }, { id: 8, top: '80%', left: '25%' },
                                                    { id: 9, top: '80%', left: '10%' },
                                                ].map(pin => (
                                                    <div key={pin.id} className="absolute flex flex-col items-center transform -translate-x-1/2 -translate-y-full" style={{ top: pin.top, left: pin.left }}>
                                                        <div className="w-3.5 h-3.5 bg-yellow-400 rounded-full flex items-center justify-center text-[7px] font-bold text-slate-900 border border-white shadow-sm">{pin.id}</div>
                                                        <div className="w-0 h-0 border-l-[3px] border-l-transparent border-t-[4px] border-t-yellow-400 border-r-[3px] border-r-transparent"></div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {item.visual === 'dna-seq' && (
                                            <div className="mt-3 bg-white p-2 border border-slate-200 rounded flex items-center justify-around overflow-hidden h-12 shadow-inner">
                                                <i className="ph ph-hard-drives text-2xl text-slate-400"></i>
                                                <i className="ph ph-arrow-right text-eco-green"></i>
                                                <div className="flex flex-col items-center">
                                                    <div className="flex space-x-1">
                                                        <div className="w-2 h-4 bg-blue-300 rounded-sm"></div><div className="w-2 h-4 bg-green-300 rounded-sm"></div><div className="w-2 h-4 bg-yellow-300 rounded-sm"></div><div className="w-2 h-4 bg-red-300 rounded-sm"></div>
                                                    </div>
                                                    <span className="text-[6px] text-slate-400 mt-0.5 font-bold uppercase tracking-wider">Genes</span>
                                                </div>
                                            </div>
                                        )}

                                        {item.visual === 'dashboard' && (
                                            <div className="mt-3 flex space-x-2">
                                                {[1, 2].map(board => (
                                                    <div key={board} className="flex-1 bg-white border border-slate-200 rounded shadow-sm p-2 flex flex-col space-y-1.5">
                                                        <div className="h-1.5 w-1/3 bg-slate-300 rounded mb-1"></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div><div className="h-1 w-full bg-blue-100 rounded overflow-hidden"><div className="h-full bg-blue-500 rounded" style={{width: '60%'}}></div></div></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-green-500 shrink-0"></div><div className="h-1 w-full bg-green-100 rounded overflow-hidden"><div className="h-full bg-green-500 rounded" style={{width: '85%'}}></div></div></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></div><div className="h-1 w-full bg-red-100 rounded overflow-hidden"><div className="h-full bg-red-500 rounded" style={{width: '40%'}}></div></div></div>
                                                        <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-purple-500 shrink-0"></div><div className="h-1 w-full bg-purple-100 rounded overflow-hidden"><div className="h-full bg-purple-500 rounded" style={{width: '70%'}}></div></div></div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>
                </div>
            </div>
        );

        // 2. MATERIAIS
        const MaterialsScreen = () => {
            const [checkedItems, setCheckedItems] = useState({});
            const toggleItem = (id) => setCheckedItems(prev => ({...prev, [id]: !prev[id]}));

            return (
                <div className="space-y-6 max-w-5xl mx-auto w-full">
                    <h2 className="text-xl md:text-2xl font-bold text-eco-dark flex items-center">
                        <i className="ph ph-toolbox mr-2 text-eco-green text-3xl"></i> Kit e Materiais
                    </h2>
                    
                    <Card>
                        <h3 className="font-bold text-slate-700 mb-4 text-sm md:text-base uppercase tracking-wide">Fornecidos no Kit Ecobhio</h3>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                            <IconBox icon="ph-bag" label="Sacos" qty="24" obs="'Ponto 1 ao 15' por tratamento" />
                            <IconBox icon="ph-shovel" label="Pá Dosadora" qty="1" />
                            <IconBox icon="ph-hand-palm" label="Par de Luvas" qty="1" obs="Descartável" />
                            <IconBox icon="ph-flask" label="Tubo Cônico" qty="24" obs="50ml" />
                            <IconBox icon="ph-flag" label="Bandeiras" qty="24" obs="Identificação" />
                        </div>
                    </Card>

                    <Card>
                        <h3 className="font-bold text-slate-700 mb-3 text-sm md:text-base uppercase tracking-wide">Providenciar (Ferramentas de Corte)</h3>
                        <p className="text-xs md:text-sm text-slate-500 mb-4">Selecione o que você tem à disposição (checklist interativo):</p>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                            {[
                                { id: 't-rosca', label: 'Trado de Rosca', img: 'ph-spiral' },
                                { id: 't-calador', label: 'Trado Calador', img: 'ph-needle' },
                                { id: 't-holandes', label: 'Trado Holandês', img: 'ph-anchor' },
                                { id: 'pa', label: 'Pá Reta / Pá de corte', img: 'ph-shovel' },
                                { id: 'enxadao', label: 'Enxadão', img: 'ph-pickaxe' },
                                { id: 'balde', label: 'Balde Limpo', img: 'ph-bucket' }
                            ].map(tool => (
                                <label key={tool.id} className={`flex items-center p-3 md:p-4 rounded-lg border cursor-pointer transition-colors ${checkedItems[tool.id] ? 'bg-green-50 border-green-300 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <input type="checkbox" className="checkbox-round mr-4 shrink-0" checked={!!checkedItems[tool.id]} onChange={() => toggleItem(tool.id)} />
                                    <i className={`ph ${tool.img} text-2xl mr-3 ${checkedItems[tool.id] ? 'text-eco-green' : 'text-slate-400'}`}></i>
                                    <span className={`font-medium text-sm md:text-base ${checkedItems[tool.id] ? 'text-eco-dark' : 'text-slate-600'}`}>{tool.label}</span>
                                </label>
                            ))}
                        </div>

                        </div>
                        
                        <p className="text-xs md:text-sm text-slate-600 text-justify bg-yellow-50 p-4 rounded-lg border border-yellow-200 shadow-sm flex items-start">
                            <i className="ph-fill ph-info text-yellow-500 text-xl mr-3 mt-0.5 shrink-0"></i>
                            <span><strong>Nota:</strong> Todos os pontos serão georreferenciados e comparados ponto a ponto. Cada coleta será realizada <strong>sempre na mesma coordenada geográfica</strong> do ponto e na linha do plantio.</span>
                        </p>
                    </Card>

                    <div className="space-y-6 flex flex-col h-full">
                        <Card className="!bg-eco-light border-eco-green/40 border-2 flex-grow">
                            <h3 className="font-bold text-eco-dark text-base md:text-lg mb-4 border-b border-eco-green/20 pb-2 flex items-center leading-tight">
                                <i className="ph ph-chart-line-up mr-2 text-eco-green text-2xl"></i> 
                                Acompanhamento Protocolo Ecobhio
                            </h3>
                            
                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                    <div className="flex items-center mb-1"><i className="ph-fill ph-virus text-red-500 mr-2 text-lg"></i><h4 className="font-bold text-[10px] md:text-xs text-slate-800 uppercase">Patógenos</h4></div>
                                    <p className="text-[9px] md:text-[10px] text-slate-600 leading-tight">Mapeamento para análises genéticas.</p>
                                </div>
                                <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                    <div className="flex items-center mb-1"><i className="ph-fill ph-bug text-orange-500 mr-2 text-lg"></i><h4 className="font-bold text-[10px] md:text-xs text-slate-800 uppercase">Nematóides</h4></div>
                                    <p className="text-[9px] md:text-[10px] text-slate-600 leading-tight">Análises início e final do ciclo.</p>
                                </div>
                                <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                    <div className="flex items-center mb-1"><i className="ph-fill ph-leaf text-green-500 mr-2 text-lg"></i><h4 className="font-bold text-[10px] md:text-xs text-slate-800 uppercase">Microrganismos</h4></div>
                                    <p className="text-[9px] md:text-[10px] text-slate-600 leading-tight">Benéficos comuns para rastreabilidade.</p>
                                </div>
                                <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                    <div className="flex items-center mb-1"><i className="ph-fill ph-satellite text-blue-500 mr-2 text-lg"></i><h4 className="font-bold text-[10px] md:text-xs text-slate-800 uppercase">NDVI</h4></div>
                                    <p className="text-[9px] md:text-[10px] text-slate-600 leading-tight">Imagens de satélite para Biomassa.</p>
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-eco-green"></div>
                                <h4 className="font-bold text-sm text-eco-dark mb-2 flex items-center">
                                    <i className="ph-fill ph-list-magnifying-glass text-eco-green mr-2 text-xl"></i> Resultados Esperados
                                </h4>
                                <p className="text-xs md:text-sm text-slate-600 mb-3 text-justify leading-relaxed">
                                    Acompanhamento da <strong>microbiota existente e suas interações</strong>. Comparação média de produção área tratada vs não tratada. <em>Se possível, avaliar qualidade do fruto (Brix, Calibre, Peso).</em>
                                </p>
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded flex items-center">
                                    <i className="ph-fill ph-file-pdf text-red-500 text-3xl mr-3 shrink-0"></i>
                                    <div>
                                        <strong className="text-eco-dark text-xs md:text-sm block">Relatório Final Agronômico</strong>
                                        <span className="text-[10px] md:text-xs text-slate-500">Entregue ao final do ciclo da cultura.</span>
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>
                </div>
            </div>
        );

        // 6. METODOLOGIA E ANÁLISES
        const MethodologyScreen = () => (
            <div className="space-y-6 animate-fade-in max-w-5xl mx-auto w-full">
                <h2 className="text-xl md:text-2xl font-bold text-eco-dark flex items-center mb-6">
                    <i className="ph ph-microscope mr-2 text-eco-green text-3xl"></i> Metodologia GOLSOLOS
                </h2>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                    <Card className="border-t-4 border-t-eco-green">
                        <h3 className="font-bold text-slate-800 text-sm md:text-base mb-6 uppercase flex items-center border-b pb-2">
                            qPCR <span className="text-xs text-slate-500 ml-2 normal-case font-medium">(Como funciona?)</span>
                        </h3>

                        <div className="relative border-l-2 border-slate-200 ml-4 space-y-8 pb-4 mt-4">
                            {[
                                { step: 1, title: "DNA de amostra de solo", icon: "ph-dna", color: "blue" },
                                { step: 2, title: "Primers + Fluoróforo + qPCR", icon: "ph-test-tube", color: "green", italic: true },
                                { step: 3, title: "Detecção Fluorescente", icon: "ph-monitor-waveform", color: "purple" }
                            ].map((item) => (
                                <div key={item.step} className="relative">
                                    <div className={`absolute -left-[17px] top-1 w-8 h-8 md:w-10 md:h-10 bg-${item.color}-100 rounded-full border-2 border-white flex items-center justify-center text-${item.color}-600 shadow-sm`}>
                                        <i className={`ph-fill ${item.icon} text-lg md:text-xl`}></i>
                                    </div>
                                    <div className="ml-12 md:ml-16 bg-slate-50 border border-slate-100 p-4 rounded-lg shadow-sm">
                                        <span className="text-[10px] md:text-xs font-bold text-slate-400 block mb-1 uppercase tracking-widest">Passo {item.step}</span>
                                        <h4 className="text-sm md:text-base font-bold text-slate-700">
                                            {item.italic ? <span dangerouslySetInnerHTML={{__html: item.title.replace('Primers', '<em>Primers</em>')}} /> : item.title}
                                        </h4>
                                    </div>
                                </div>
                            ))}
                            
                            {/* Step 4 (Destaque) */}
                            <div className="relative">
                                <div className="absolute -left-[17px] top-1 w-8 h-8 md:w-10 md:h-10 bg-orange-100 rounded-full border-2 border-white flex items-center justify-center text-orange-600 shadow-md ring-2 ring-orange-200">
                                    <i className="ph-fill ph-chart-line-up text-lg md:text-xl"></i>
                                </div>
                                <div className="ml-12 md:ml-16 bg-orange-50 border border-orange-200 p-4 md:p-5 rounded-lg shadow-md relative">
                                    <span className="text-[10px] md:text-xs font-bold text-orange-500 block mb-1 uppercase tracking-widest">Passo 4 (Final)</span>
                                    <h4 className="text-sm md:text-lg font-bold text-slate-800">Curva-padrão e Quantificação</h4>
                                    
                                    <div className="mt-4 flex flex-col sm:flex-row gap-3">
                                        <div className="bg-white p-3 rounded border border-orange-100 flex items-start shadow-sm flex-1">
                                            <i className="ph-fill ph-cell-signal-full text-orange-500 mr-2 text-xl shrink-0"></i>
                                            <span className="text-xs md:text-sm text-slate-700 font-medium leading-tight">Quantidade de células por grama de solo</span>
                                        </div>
                                        <div className="bg-white p-3 rounded border border-orange-100 flex items-start shadow-sm flex-1">
                                            <i className="ph-fill ph-clock text-orange-500 mr-2 text-xl shrink-0"></i>
                                            <span className="text-xs md:text-sm text-slate-700 font-medium leading-tight">Resultado em <strong>até 60 dias</strong></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </Card>

                    {/* List of Microorganisms */}
                    <Card className="border-t-4 border-t-[#004d40]">
                        <div className="flex items-center justify-between mb-4 border-b pb-4">
                            <div>
                                <h3 className="font-bold text-slate-800 text-sm md:text-lg leading-tight">Lista de Microrganismos</h3>
                                <span className="text-xs text-slate-500 font-medium uppercase tracking-widest">Painel Golsolos</span>
                            </div>
                            <div className="w-12 h-12 md:w-16 md:h-16 rounded-full bg-[#004d40] flex items-center justify-center text-white font-bold border-[3px] border-[#d35400] shrink-0 shadow-lg">
                                <span className="text-white text-lg md:text-2xl">G</span><span className="text-[#d35400] text-lg md:text-2xl italic">S</span>
                            </div>
                        </div>
                        
                        <p className="text-xs md:text-sm text-slate-600 mb-4 text-justify">Alguns dos principais microrganismos (vírus, fungos, bactérias e nematóides) que a análise consegue identificar:</p>

                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 h-64 md:h-[420px] overflow-y-auto custom-scrollbar text-xs md:text-sm text-slate-700 columns-1 sm:columns-2 gap-6 font-mono shadow-inner relative">
                            <ul className="list-disc pl-4 space-y-2">
                                <li>Allexivirus</li><li>American Hop Latent Virus</li><li>Apple mosaic virus</li><li>Azospirillum brasilense</li>
                                <li>Bacillus amyloliquefaciens</li><li>Bacillus aryabhattai</li><li>Bacillus cereus</li><li>Bacillus licheniformis</li>
                                <li>Bacillus pumilus</li><li>Bacillus subtilis</li><li>Bacillus thuringiensis</li><li>Beauveria bassiana</li>
                                <li>Bradyrhizobium spp.</li><li>Bactérias totais</li><li>Coliformes termotolerantes</li><li>Colletotrichum spp.</li>
                                <li>Escherichia coli</li><li>Fusarium oxysporum</li><li>Fusarium solani</li><li>Fungos totais</li>
                                <li>Heterodera glycines</li><li>Macrophomina phaseolina</li><li>Meloidogyne javanica</li><li>Metarhizium anisopliae</li>
                                <li>Paecilomyces lilacinus</li><li>Pochonia chlamydosporia</li><li>Pseudomonas fluorescens</li><li>Rhizoctonia solani</li>
                                <li>Saccharomyces cerevisiae</li><li>Salmonella spp.</li><li>Trichoderma spp.</li><li>Verticillium dahliae</li>
                            </ul>
                        </div>
                        <div className="text-center mt-3">
                            <span className="text-[10px] md:text-xs text-slate-400 uppercase tracking-widest flex justify-center items-center">
                                <i className="ph ph-arrows-out-line-vertical mr-2 text-lg"></i> Deslize para ver a lista completa
                            </span>
                        </div>
                    </Card>
                </div>
            </div>
        );

        // --- COMPONENTE PRINCIPAL (APP) ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('intro');

            const tabs = [
                { id: 'intro', icon: 'ph-info', label: 'Início' },
                { id: 'mat', icon: 'ph-toolbox', label: 'Kit' },
                { id: 'alert', icon: 'ph-shield-warning', label: 'Cuidados' },
                { id: 'step', icon: 'ph-list-numbers', label: 'Coleta' },
                { id: 'time', icon: 'ph-calendar-check', label: 'Prazos' },
                { id: 'method', icon: 'ph-microscope', label: 'Análise' }
            ];

            return (
                /* Container Responsivo */
                <div className="min-h-screen bg-slate-100 flex flex-col relative font-sans">
                    
                    {/* Header Responsivo (Desktop/Web) - Adicionado z-[100] para garantir cliques */}
                    <header className="bg-white px-4 md:px-8 py-4 shadow-sm sticky top-0 z-[100] flex justify-between items-center w-full">
                        <div className="flex items-center">
                            <h1 className="text-2xl md:text-3xl font-black tracking-tight text-eco-green flex items-center">
                                <span className="italic">ecobhio</span>
                                <i className="ph-fill ph-leaf text-yellow-400 ml-1 text-2xl -mt-2"></i>
                            </h1>
                            <span className="text-[10px] md:text-xs text-slate-400 uppercase tracking-widest font-bold ml-2 pt-1 hidden sm:block border-l-2 border-slate-200 pl-2">Tecnologia</span>
                        </div>
                        
                        {/* Navegação Desktop - Adicionado cursor-pointer */}
                        <div className="hidden md:flex space-x-1 lg:space-x-2">
                            {tabs.map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex items-center px-4 py-2 rounded-lg transition-all duration-200 font-bold text-sm lg:text-base cursor-pointer relative z-[100] ${currentTab === tab.id ? 'bg-eco-green text-white shadow-md transform scale-105' : 'text-slate-500 hover:bg-slate-100 hover:text-eco-dark'}`}
                                >
                                    <i className={`ph ${currentTab === tab.id ? tab.icon + '-fill' : tab.icon} text-xl mr-2`}></i>
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Ícone Mobile Menu (Apenas estético) */}
                        <div className="md:hidden bg-slate-100 p-2 rounded-full cursor-pointer hover:bg-slate-200 transition">
                            <i className="ph ph-list text-xl text-slate-600"></i>
                        </div>
                    </header>

                    {/* Área de Conteúdo Principal - Removido overflow-y-auto, adicionado pb-32 para espaço da nav no telemóvel */}
                    <main className="flex-grow w-full p-4 md:p-8 pb-32 md:pb-12">
                        {currentTab === 'intro' && <IntroScreen />}
                        {currentTab === 'mat' && <MaterialsScreen />}
                        {currentTab === 'alert' && <WarningsScreen />}
                        {currentTab === 'step' && <StepByStepScreen />}
                        {currentTab === 'time' && <TimelineScreen />}
                        {currentTab === 'method' && <MethodologyScreen />}
                    </main>

                    {/* Navegação Mobile Inferior (Telemóvel) */}
                    <nav className="md:hidden bg-white border-t border-slate-200 fixed bottom-0 w-full pb-safe z-[100] overflow-x-auto hide-scrollbar shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <div className="flex justify-between items-center h-16 px-1 min-w-[320px]">
                            {tabs.map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors relative cursor-pointer ${currentTab === tab.id ? 'text-eco-green' : 'text-slate-400 active:text-slate-600'}`}
                                >
                                    {currentTab === tab.id && <div className="absolute top-0 w-8 h-1 bg-eco-green rounded-b-full"></div>}
                                    <i className={`ph ${currentTab === tab.id ? tab.icon + '-fill' : tab.icon} text-2xl`}></i>
                                    <span className="text-[9px] font-bold uppercase">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Estilos Auxiliares */}
                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
                        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                    `}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
