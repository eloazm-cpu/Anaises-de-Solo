<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Coleta de Solo - Ecobhio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        eco: {
                            green: '#74A629', // Verde logotipo Ecobhio
                            dark: '#0B2046',  // Azul escuro logotipo
                            light: '#F4F7F2',
                            yellow: '#F2C200'
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Checkbox */
        .checkbox-round {
            width: 1.5em;
            height: 1.5em;
            background-color: white;
            border-radius: 50%;
            vertical-align: middle;
            border: 2px solid #cbd5e1;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease-in-out;
        }
        .checkbox-round:checked {
            background-color: #74A629;
            border-color: #74A629;
        }
        .checkbox-round:checked::after {
            content: '\2714';
            font-size: 14px;
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Zig Zag Line for CSS */
        .zig-zag-path {
            border-left: 3px dashed #74A629;
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            z-index: 0;
        }

        /* Animações Customizadas */
        @keyframes crushDown {
            0%, 100% { transform: translateY(-20px); }
            40%, 60% { transform: translateY(10px); }
        }
        @keyframes clodBreak {
            0%, 30% { transform: scale(1); opacity: 1; }
            40%, 60% { transform: scale(1.2); opacity: 0; }
            70%, 100% { transform: scale(0); opacity: 0; }
        }
        @keyframes particlesShow {
            0%, 30% { opacity: 0; transform: scale(0); }
            40%, 100% { opacity: 1; transform: scale(1); }
        }
        @keyframes tiltSpade {
            0%, 100% { transform: rotate(0deg); }
            30%, 70% { transform: rotate(-35deg) translate(-10px, 10px); }
        }
        @keyframes dirtDrop {
            0%, 30% { opacity: 0; transform: translateY(-10px); }
            40%, 60% { opacity: 1; transform: translateY(30px); }
            70%, 100% { opacity: 0; transform: translateY(40px); }
        }
        @keyframes fillUp {
            0%, 30% { height: 10%; }
            70%, 100% { height: 80%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTES REUTILIZÁVEIS ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-100 p-5 ${className}`}>
                {children}
            </div>
        );

        const IconBox = ({ icon, label, qty, obs, iconColor="text-eco-dark" }) => (
            <div className="flex flex-col items-center p-4 bg-slate-50 rounded-lg border border-slate-200 text-center hover:shadow-md transition-shadow">
                <div className={`w-16 h-16 rounded-full bg-eco-dark flex items-center justify-center mb-3 shadow-inner`}>
                    <i className={`ph ${icon} text-3xl text-white`}></i>
                </div>
                <h4 className="font-bold text-slate-800 leading-tight">{label}</h4>
                {qty && <span className="text-sm font-semibold text-eco-green mt-1">Qtd. {qty}</span>}
                {obs && <p className="text-xs text-slate-500 mt-1 leading-tight">{obs}</p>}
            </div>
        );

        // --- COMPONENTE DE VÍDEO/GIF ---
        const MediaViewer = ({ type, src, placeholderText }) => (
            <div className="relative rounded-xl overflow-hidden shadow-sm border-2 border-dashed border-slate-300 mt-4 bg-slate-200 w-full max-w-[280px] mx-auto aspect-video flex flex-col items-center justify-center group cursor-pointer">
                {src ? (
                    type === 'video' ? (
                        <video src={src} autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover" />
                    ) : (
                        <img src={src} alt="Demonstração" className="absolute inset-0 w-full h-full object-cover" />
                    )
                ) : (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-100">
                        <i className="ph ph-video-camera text-4xl text-slate-300 mb-2"></i>
                    </div>
                )}
                
                <div className={`absolute inset-0 bg-slate-900/30 flex flex-col items-center justify-center ${src ? 'opacity-0 hover:opacity-100' : 'opacity-100'} transition-opacity duration-300`}>
                     <i className="ph-fill ph-play-circle text-4xl text-white opacity-90 drop-shadow-md"></i>
                     <span className="text-white text-[10px] font-bold mt-2 bg-black/60 px-3 py-1 rounded-full">
                        {placeholderText || "Inserir link do seu GIF/Vídeo"}
                     </span>
                </div>
            </div>
        );

        // --- ANIMAÇÕES ILUSTRATIVAS (CSS) ---
        const AnimHomogeneizacao = () => (
            <div className="relative rounded-xl overflow-hidden shadow-sm border border-slate-200 mt-4 bg-white w-full max-w-[280px] mx-auto h-40 flex items-center justify-center">
                <span className="absolute top-2 left-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ilustração</span>
                
                {/* Saco Plástico */}
                <div className="w-32 h-32 border-4 border-slate-200 rounded-lg relative flex items-center justify-center bg-slate-50">
                    <div className="absolute -top-4 w-28 h-6 border-4 border-slate-200 rounded-t-lg bg-slate-50 border-b-0"></div>
                    
                    {/* Torrão */}
                    <div className="w-12 h-10 bg-[#8b5a2b] rounded-full absolute" style={{ animation: 'clodBreak 3s infinite' }}></div>
                    
                    {/* Partículas (Solo quebrado) */}
                    <div className="absolute flex flex-wrap justify-center w-20 gap-1" style={{ animation: 'particlesShow 3s infinite' }}>
                        {[...Array(8)].map((_, i) => (
                            <div key={i} className="w-3 h-3 bg-[#6c421b] rounded-sm"></div>
                        ))}
                    </div>
                </div>

                {/* Mão (Fora do saco) */}
                <div className="absolute z-10 text-eco-dark drop-shadow-lg" style={{ animation: 'crushDown 3s infinite' }}>
                    <i className="ph-fill ph-hand-palm text-6xl"></i>
                </div>
            </div>
        );

        const AnimPreenchimentoTubo = () => (
            <div className="relative rounded-xl overflow-hidden shadow-sm border border-slate-200 mt-4 bg-white w-full max-w-[280px] mx-auto h-40 flex items-center justify-center">
                <span className="absolute top-2 left-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ilustração</span>
                
                {/* Tubo Cônico */}
                <div className="relative w-10 h-28 border-4 border-b-[8px] border-slate-300 rounded-b-xl border-t-0 flex items-end justify-center pb-1">
                    <div className="absolute -top-2 w-12 h-3 bg-blue-400 rounded-sm"></div>
                    {/* Nível de Terra subindo */}
                    <div className="w-full bg-[#6c421b] rounded-b-md transition-all" style={{ animation: 'fillUp 3s infinite' }}></div>
                </div>

                {/* Pá Dosadora e Terra caindo */}
                <div className="absolute top-4 right-16 flex flex-col items-center">
                    <div className="origin-bottom-right" style={{ animation: 'tiltSpade 3s infinite' }}>
                        <i className="ph-fill ph-shovel text-5xl text-slate-600 transform -rotate-45"></i>
                    </div>
                    {/* Terra caindo */}
                    <div className="absolute top-8 right-6 w-3 h-3 bg-[#8b5a2b] rounded-full" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                    <div className="absolute top-10 right-4 w-2 h-2 bg-[#6c421b] rounded-full delay-75" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                    <div className="absolute top-12 right-8 w-2 h-2 bg-[#8b5a2b] rounded-full delay-150" style={{ animation: 'dirtDrop 3s infinite' }}></div>
                </div>
            </div>
        );

        // --- TELAS DO APLICATIVO ---

        // 1. INTRODUÇÃO
        const IntroScreen = () => (
            <div className="space-y-6 animate-fade-in">
                <div className="bg-eco-green text-white p-6 rounded-2xl shadow-lg relative overflow-hidden">
                    <div className="relative z-10">
                        <h2 className="text-2xl font-bold mb-2">Coleta na Rizosfera</h2>
                        <p className="text-sm opacity-90 mb-4 text-justify">
                            Este guia traz as informações necessárias para realizar a coleta de solo na linha de plantio e avaliar a microbiota que está em contato direto com as plantas.
                        </p>
                        <div className="bg-white/20 p-3 rounded-lg backdrop-blur-sm border border-white/30 text-sm">
                            <i className="ph ph-target mr-2"></i>
                            É o mais indicado para avaliar o efeito de <strong>bioinsumos</strong> e interações dos microrganismos com a planta na rizosfera.
                        </div>
                    </div>
                    <i className="ph ph-plant absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                </div>

                <Card>
                    <h3 className="font-bold text-eco-dark text-lg mb-4 border-b pb-2 flex items-center">
                        <i className="ph ph-map-pin-line mr-2 text-eco-green"></i> Estratégia de Coleta
                    </h3>
                    <p className="text-slate-600 text-sm mb-4 text-justify">
                        Para compor a amostra serão realizadas coletas numa área de interesse da empresa, sempre recolhendo <strong>2 pontos</strong>:
                    </p>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        <div className="bg-green-50 border border-green-200 p-3 rounded-lg text-center flex flex-col justify-center shadow-sm">
                            <div className="font-bold text-green-700 text-lg mb-1">1 Ponto</div>
                            <div className="text-[11px] text-green-700 font-medium leading-tight">Área Tratada<br/>(Produtos Ecobhio)</div>
                        </div>
                        <div className="bg-slate-100 border border-slate-200 p-3 rounded-lg text-center flex flex-col justify-center shadow-sm">
                            <div className="font-bold text-slate-700 text-lg mb-1">1 Ponto</div>
                            <div className="text-[11px] text-slate-600 font-medium leading-tight">Área Testemunha<br/>(Padrão Fazenda)</div>
                        </div>
                    </div>

                    {/* Novo Visual: Mapa de Produtividade / NDVI */}
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                        <div className="mb-3 flex items-center justify-between">
                            <span className="font-bold text-xs text-slate-700 uppercase tracking-wide">Produtividade</span>
                            <div className="w-1/2 relative pt-2">
                                {/* Seta da Escala */}
                                <div className="absolute top-0 left-0 w-full flex items-center">
                                    <div className="h-[2px] bg-slate-800 w-full"></div>
                                    <div className="w-0 h-0 border-y-[4px] border-y-transparent border-l-[6px] border-l-slate-800 -ml-1"></div>
                                </div>
                                {/* Barra de Cores */}
                                <div className="flex h-3 w-full rounded-sm overflow-hidden border border-slate-300 shadow-sm mt-1">
                                    <div className="flex-1 bg-[#ff0000]"></div>
                                    <div className="flex-1 bg-[#ffff00]"></div>
                                    <div className="flex-1 bg-[#ccff33]"></div>
                                    <div className="flex-1 bg-[#33cc33]"></div>
                                    <div className="flex-1 bg-[#006600]"></div>
                                </div>
                            </div>
                        </div>
                        
                        {/* Simulação de Mapa NDVI por CSS */}
                        <div className="w-full h-40 rounded-lg border-2 border-slate-300 overflow-hidden relative shadow-sm" style={{
                            background: 'radial-gradient(ellipse at 15% 15%, #ff0000 0%, #ff6600 25%, transparent 50%), radial-gradient(ellipse at 85% 85%, #ff0000 0%, #ffff00 35%, transparent 60%), linear-gradient(135deg, #ccff33 0%, #33cc33 50%, #006600 100%)'
                        }}>
                            {/* Textura de ruído / satélite */}
                            <div className="absolute inset-0 opacity-10 mix-blend-overlay" style={{ backgroundImage: 'repeating-linear-gradient(0deg, transparent, transparent 2px, #000 2px, #000 4px)' }}></div>
                            <div className="absolute inset-0 opacity-10 mix-blend-overlay" style={{ backgroundImage: 'repeating-linear-gradient(90deg, transparent, transparent 2px, #000 2px, #000 4px)' }}></div>
                            {/* Foco de Produtividade Central */}
                            <div className="absolute top-1/4 left-1/3 w-1/2 h-1/2 bg-[#33cc33] blur-xl opacity-60 rounded-full"></div>
                        </div>
                    </div>
                </Card>

                {/* NOVO BLOCO COM O TEXTO EXATO DA IMAGEM SOBRE FREEZER E GELOX */}
                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg shadow-sm mb-6">
                    <h4 className="font-bold text-blue-900 text-sm mb-2 flex items-center">
                        <i className="ph ph-snowflake text-lg mr-2"></i> Armazenamento e Envio
                    </h4>
                    <p className="text-xs text-blue-800 text-justify leading-relaxed">
                        Assim que a amostra for coletada e embalada, ela deve ser acondicionada em <strong>freezer</strong> até o envio e deve ser postada o mais rápido possível para garantir a qualidade do resultado. Nossa indicação é que a amostra não demore mais de <strong>07 dias corridos</strong> para chegar no laboratório, após ter sido coletada. O envio deve ter as mesmas condições da armazenagem, ou seja, se tiver em freezer enviar com <strong>gelox</strong>.
                    </p>
                </div>

                <Card>
                    <h3 className="font-bold text-eco-dark text-lg mb-4 border-b pb-2">Como acontecem as análises</h3>
                    <div className="flex flex-col space-y-4 relative">
                        <div className="absolute left-4 top-2 bottom-2 w-0.5 bg-eco-green/30 z-0"></div>
                        
                        {[
                            { step: 1, title: "Kit de Coleta", icon: "ph-package" },
                            { step: 2, title: "Coleta da Amostra", desc: "Amostragem da comunidade microbiana (Ecobhio x Padrão)", icon: "ph-flask", visual: "map" },
                            { step: 3, title: "Processamento", desc: "Extração do DNA", icon: "ph-dna" },
                            { step: 4, title: "Sequenciamento Genético", desc: "Decodificação da diversidade genética (Identificação de genes)", icon: "ph-activity", visual: "dna-seq" },
                            { step: 5, title: "Laudo e Recomendação", desc: "Interpretação dos resultados e Recomendação ECOBHIO", icon: "ph-file-text", visual: "dashboard" }
                        ].map((item) => (
                            <div key={item.step} className="flex items-start relative z-10">
                                <div className="w-8 h-8 rounded-full bg-eco-green text-white flex items-center justify-center font-bold text-sm shrink-0 shadow-md">
                                    {item.step}
                                </div>
                                <div className="ml-4 bg-slate-50 p-3 rounded-lg border border-slate-100 w-full flex flex-col justify-center">
                                    <div className="flex items-center">
                                        <i className={`ph ${item.icon} text-2xl text-eco-dark mr-3 opacity-70`}></i>
                                        <div>
                                            <div className="font-bold text-sm text-slate-800">{item.title}</div>
                                            {item.desc && <div className="text-xs text-slate-500 mt-0.5">{item.desc}</div>}
                                        </div>
                                    </div>
                                    
                                    {/* Visualização Condicional baseada na nova imagem */}
                                    {item.visual === 'map' && (
                                        <div className="mt-3 relative w-full h-32 bg-[#8c949e] rounded-lg overflow-hidden border-2 border-slate-300 shadow-inner">
                                            <div className="absolute top-0 w-full bg-[#1e293b] text-center text-[10px] text-white py-0.5 font-bold z-10">Talhão 405</div>
                                            <div className="absolute top-0 bottom-0 left-[60%] w-px bg-white/40 transform rotate-45 origin-top"></div>
                                            <div className="absolute top-0 bottom-0 left-0 w-px bg-white/40 transform -rotate-45 origin-top translate-x-10"></div>
                                            {/* Pins */}
                                            {[
                                                { id: 1, top: '80%', left: '85%' },
                                                { id: 2, top: '65%', left: '85%' },
                                                { id: 3, top: '50%', left: '85%' },
                                                { id: 4, top: '35%', left: '85%' },
                                                { id: 5, top: '20%', left: '85%' },
                                                { id: 6, top: '85%', left: '60%' },
                                                { id: 7, top: '82%', left: '40%' },
                                                { id: 8, top: '80%', left: '25%' },
                                                { id: 9, top: '80%', left: '10%' },
                                            ].map(pin => (
                                                <div key={pin.id} className="absolute flex flex-col items-center transform -translate-x-1/2 -translate-y-full" style={{ top: pin.top, left: pin.left }}>
                                                    <div className="w-3.5 h-3.5 bg-yellow-400 rounded-full flex items-center justify-center text-[7px] font-bold text-slate-900 border border-white shadow-sm">{pin.id}</div>
                                                    <div className="w-0 h-0 border-l-[3px] border-l-transparent border-t-[4px] border-t-yellow-400 border-r-[3px] border-r-transparent"></div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {item.visual === 'dna-seq' && (
                                        <div className="mt-3 bg-white p-2 border border-slate-200 rounded flex items-center justify-around overflow-hidden h-12 shadow-inner">
                                            <i className="ph ph-hard-drives text-2xl text-slate-400"></i>
                                            <i className="ph ph-arrow-right text-eco-green"></i>
                                            <div className="flex flex-col items-center">
                                                <div className="flex space-x-1">
                                                    <div className="w-2 h-4 bg-blue-300 rounded-sm"></div>
                                                    <div className="w-2 h-4 bg-green-300 rounded-sm"></div>
                                                    <div className="w-2 h-4 bg-yellow-300 rounded-sm"></div>
                                                    <div className="w-2 h-4 bg-red-300 rounded-sm"></div>
                                                </div>
                                                <span className="text-[6px] text-slate-400 mt-0.5 font-bold uppercase tracking-wider">Genes</span>
                                            </div>
                                        </div>
                                    )}

                                    {item.visual === 'dashboard' && (
                                        <div className="mt-3 flex space-x-2">
                                            {[1, 2].map(board => (
                                                <div key={board} className="flex-1 bg-white border border-slate-200 rounded shadow-sm p-2 flex flex-col space-y-1.5">
                                                    <div className="h-1.5 w-1/3 bg-slate-300 rounded mb-1"></div>
                                                    <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0"></div><div className="h-1 w-full bg-blue-100 rounded overflow-hidden"><div className="h-full bg-blue-500 rounded" style={{width: '60%'}}></div></div></div>
                                                    <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-green-500 shrink-0"></div><div className="h-1 w-full bg-green-100 rounded overflow-hidden"><div className="h-full bg-green-500 rounded" style={{width: '85%'}}></div></div></div>
                                                    <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></div><div className="h-1 w-full bg-red-100 rounded overflow-hidden"><div className="h-full bg-red-500 rounded" style={{width: '40%'}}></div></div></div>
                                                    <div className="flex items-center space-x-1"><div className="w-1.5 h-1.5 rounded-full bg-purple-500 shrink-0"></div><div className="h-1 w-full bg-purple-100 rounded overflow-hidden"><div className="h-full bg-purple-500 rounded" style={{width: '70%'}}></div></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </Card>
            </div>
        );

        // 2. MATERIAIS
        const MaterialsScreen = () => {
            const [checkedItems, setCheckedItems] = useState({});
            const toggleItem = (id) => setCheckedItems(prev => ({...prev, [id]: !prev[id]}));

            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-bold text-eco-dark flex items-center">
                        <i className="ph ph-toolbox mr-2 text-eco-green text-2xl"></i> Kit e Materiais
                    </h2>
                    
                    <Card>
                        <h3 className="font-bold text-slate-700 mb-4 text-sm uppercase tracking-wide">Fornecidos no Kit Ecobhio</h3>
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                            <IconBox icon="ph-bag" label="Sacos" qty="24" obs="'Ponto 1 ao 15' por tratamento" />
                            <IconBox icon="ph-shovel" label="Pá Dosadora" qty="1" />
                            <IconBox icon="ph-hand-palm" label="Par de Luvas" qty="1" obs="Descartável" />
                            <IconBox icon="ph-flask" label="Tubo Cônico" qty="24" obs="50ml" />
                            <IconBox icon="ph-flag" label="Bandeiras" qty="24" obs="Identificação" />
                        </div>
                    </Card>

                    <Card>
                        <h3 className="font-bold text-slate-700 mb-3 text-sm uppercase tracking-wide">Providenciar (Ferramentas de Corte)</h3>
                        <p className="text-xs text-slate-500 mb-4">Selecione o que você tem à disposição (checklist interativo):</p>
                        
                        <div className="space-y-2">
                            {[
                                { id: 't-rosca', label: 'Trado de Rosca', img: 'ph-spiral' },
                                { id: 't-calador', label: 'Trado Calador', img: 'ph-needle' },
                                { id: 't-holandes', label: 'Trado Holandês', img: 'ph-anchor' },
                                { id: 'pa', label: 'Pá Reta / Pá de corte', img: 'ph-shovel' },
                                { id: 'enxadao', label: 'Enxadão', img: 'ph-pickaxe' },
                                { id: 'balde', label: 'Balde Limpo', img: 'ph-bucket' }
                            ].map(tool => (
                                <label key={tool.id} className={`flex items-center p-3 rounded-lg border cursor-pointer transition-colors ${checkedItems[tool.id] ? 'bg-green-50 border-green-300' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <input type="checkbox" className="checkbox-round mr-4" checked={!!checkedItems[tool.id]} onChange={() => toggleItem(tool.id)} />
                                    <i className={`ph ${tool.img} text-xl mr-3 ${checkedItems[tool.id] ? 'text-eco-green' : 'text-slate-400'}`}></i>
                                    <span className={`font-medium ${checkedItems[tool.id] ? 'text-eco-dark' : 'text-slate-600'}`}>{tool.label}</span>
                                </label>
                            ))}
                        </div>
                    </Card>
                </div>
            );
        };

        // 3. RECOMENDAÇÕES
        const WarningsScreen = () => (
            <div className="space-y-4">
                <h2 className="text-xl font-bold text-eco-dark flex items-center mb-6">
                    <i className="ph ph-shield-warning mr-2 text-eco-green text-2xl"></i> Recomendações e Cuidados
                </h2>

                            </p>
                            <div className="bg-slate-50 border border-slate-200 p-3 rounded text-xs text-slate-700 text-justify flex items-start">
                                <i className="ph-fill ph-file-pdf text-red-500 text-2xl mr-2 mt-0.5"></i>
                                <div>
                                    <strong className="text-eco-dark block mb-0.5">Relatório Final Agronômico</strong>
                                    Ao final do ciclo da cultura, será entregue e apresentado um relatório final completo.
                                </div>
                            </div>
                        </div>
                    </div>
                </Card>

                <Card className="!bg-blue-50 border-blue-200">
                    <h3 className="font-bold text-blue-900 text-sm mb-3 flex items-center">
                        <i className="ph ph-thermometer-snowflake text-blue-600 text-lg mr-2"></i> Armazenamento e Postagem
                    </h3>
                    <ul className="text-sm text-blue-800 space-y-3">
                        <li className="flex items-start">
                            <i className="ph ph-snowflake text-blue-500 mr-2 mt-0.5"></i>
                            <span>Acondicionar a embalagem em <strong>freezer</strong> até o momento do envio.</span>
                        </li>
                        <li className="flex items-start">
                            <i className="ph ph-clock text-blue-500 mr-2 mt-0.5"></i>
                            <span>Postar o mais rápido possível. A amostra não deve demorar mais de <strong>07 dias corridos</strong> para chegar no laboratório.</span>
                        </li>
                        <li className="flex items-start">
                            <i className="ph ph-package text-blue-500 mr-2 mt-0.5"></i>
                            <span>O envio deve ter as mesmas condições da armazenagem: enviar com <strong>GELOX</strong>.</span>
                        </li>
                    </ul>
                </Card>
            </div>
        );

        // 6. METODOLOGIA E ANÁLISES (NOVO)
        const MethodologyScreen = () => (
            <div className="space-y-6 animate-fade-in">
                <h2 className="text-xl font-bold text-eco-dark flex items-center">
                    <i className="ph ph-microscope mr-2 text-eco-green text-2xl"></i> Metodologia GOLSOLOS
                </h2>

                {/* qPCR Workflow */}
                <Card className="border-t-4 border-t-eco-green">
                    <h3 className="font-bold text-slate-800 text-sm mb-4 uppercase flex items-center">
                        qPCR <span className="text-xs text-slate-500 ml-2 normal-case">(Como funciona?)</span>
                    </h3>

                    <div className="relative border-l-2 border-slate-200 ml-4 space-y-6 pb-4 mt-2">
                        {/* Step 1 */}
                        <div className="relative">
                            <div className="absolute -left-[17px] top-1 w-8 h-8 bg-blue-100 rounded-full border-2 border-white flex items-center justify-center text-blue-600 shadow-sm">
                                <i className="ph-fill ph-dna text-lg"></i>
                            </div>
                            <div className="ml-10 bg-slate-50 border border-slate-100 p-3 rounded-lg shadow-sm">
                                <span className="text-xs font-bold text-slate-400 block mb-1">Passo 1</span>
                                <h4 className="text-sm font-bold text-slate-700">DNA de amostra de solo</h4>
                            </div>
                        </div>
                        {/* Step 2 */}
                        <div className="relative">
                            <div className="absolute -left-[17px] top-1 w-8 h-8 bg-green-100 rounded-full border-2 border-white flex items-center justify-center text-green-600 shadow-sm">
                                <i className="ph-fill ph-test-tube text-lg"></i>
                            </div>
                            <div className="ml-10 bg-slate-50 border border-slate-100 p-3 rounded-lg shadow-sm">
                                <span className="text-xs font-bold text-slate-400 block mb-1">Passo 2</span>
                                <h4 className="text-sm font-bold text-slate-700"><em>Primers</em> + Fluoróforo + qPCR</h4>
                            </div>
                        </div>
                        {/* Step 3 */}
                        <div className="relative">
                            <div className="absolute -left-[17px] top-1 w-8 h-8 bg-purple-100 rounded-full border-2 border-white flex items-center justify-center text-purple-600 shadow-sm">
                                <i className="ph-fill ph-monitor-waveform text-lg"></i>
                            </div>
                            <div className="ml-10 bg-slate-50 border border-slate-100 p-3 rounded-lg shadow-sm">
                                <span className="text-xs font-bold text-slate-400 block mb-1">Passo 3</span>
                                <h4 className="text-sm font-bold text-slate-700">Detecção Fluorescente</h4>
                            </div>
                        </div>
                        {/* Step 4 */}
                        <div className="relative">
                            <div className="absolute -left-[17px] top-1 w-8 h-8 bg-orange-100 rounded-full border-2 border-white flex items-center justify-center text-orange-600 shadow-sm">
                                <i className="ph-fill ph-chart-line-up text-lg"></i>
                            </div>
                            <div className="ml-10 bg-orange-50 border border-orange-200 p-3 rounded-lg shadow-sm relative">
                                <span className="text-xs font-bold text-orange-500 block mb-1">Passo 4</span>
                                <h4 className="text-sm font-bold text-slate-800">Curva-padrão e Quantificação</h4>
                                
                                {/* Annotations da Imagem */}
                                <div className="mt-3 flex flex-col gap-2">
                                    <div className="bg-white px-2 py-1.5 rounded border border-orange-100 flex items-start shadow-sm">
                                        <i className="ph-fill ph-cell-signal-full text-orange-500 mr-1.5 mt-0.5 shrink-0"></i>
                                        <span className="text-[10px] text-slate-600 font-medium leading-tight">Quantidade de células do microrganismo por grama de solo</span>
                                    </div>
                                    <div className="bg-white px-2 py-1.5 rounded border border-orange-100 flex items-start shadow-sm">
                                        <i className="ph-fill ph-clock text-orange-500 mr-1.5 mt-0.5 shrink-0"></i>
                                        <span className="text-[10px] text-slate-600 font-medium leading-tight">Resultado entregue em <strong>até 60 dias</strong></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </Card>

                {/* List of Microorganisms */}
                <Card className="border-t-4 border-t-[#004d40]">
                    <div className="flex items-center justify-between mb-4 border-b pb-3">
                        <h3 className="font-bold text-slate-800 text-sm leading-tight pr-2">
                            Lista de Microrganismos (GOLSOLOS)
                        </h3>
                        {/* Simulação Logo GS */}
                        <div className="w-10 h-10 rounded-full bg-[#004d40] flex items-center justify-center text-white font-bold border-2 border-[#d35400] shrink-0 shadow-md">
                            <span className="text-white text-base">G</span><span className="text-[#d35400] text-base italic">S</span>
                        </div>
                    </div>
                    
                    <p className="text-xs text-slate-500 mb-3 text-justify">Alguns dos principais microrganismos (vírus, fungos, bactérias e nematóides) que a análise consegue identificar:</p>

                    {/* Caixa com Scroll interno para a lista longa */}
                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 h-48 overflow-y-auto hide-scrollbar text-[10px] text-slate-600 columns-1 sm:columns-2 gap-4 font-mono shadow-inner relative">
                        <ul className="list-disc pl-3 space-y-1">
                            <li>Allexivirus</li>
                            <li>American Hop Latent Virus</li>
                            <li>Apple mosaic virus</li>
                            <li>Azospirillum brasilense</li>
                            <li>Bacillus amyloliquefaciens</li>
                            <li>Bacillus aryabhattai</li>
                            <li>Bacillus cereus</li>
                            <li>Bacillus licheniformis</li>
                            <li>Bacillus pumilus</li>
                            <li>Bacillus subtilis</li>
                            <li>Bacillus thuringiensis</li>
                            <li>Beauveria bassiana</li>
                            <li>Bradyrhizobium spp.</li>
                            <li>Bactérias totais</li>
                            <li>Coliformes termotolerantes</li>
                            <li>Colletotrichum spp.</li>
                            <li>Escherichia coli</li>
                            <li>Fusarium oxysporum</li>
                            <li>Fusarium solani</li>
                            <li>Fungos totais</li>
                            <li>Heterodera glycines</li>
                            <li>Macrophomina phaseolina</li>
                            <li>Meloidogyne javanica</li>
                            <li>Metarhizium anisopliae</li>
                            <li>Paecilomyces lilacinus</li>
                            <li>Pochonia chlamydosporia</li>
                            <li>Pseudomonas fluorescens</li>
                            <li>Rhizoctonia solani</li>
                            <li>Saccharomyces cerevisiae</li>
                            <li>Salmonella spp.</li>
                            <li>Trichoderma spp.</li>
                            <li>Verticillium dahliae</li>
                        </ul>
                    </div>
                    <div className="text-center mt-2">
                        <span className="text-[9px] text-slate-400 uppercase tracking-widest flex justify-center items-center">
                            <i className="ph ph-arrows-out-line-vertical mr-1"></i> Deslize para ver a lista
                        </span>
                    </div>
                </Card>
            </div>
        );

        // --- COMPONENTE PRINCIPAL (APP) ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('intro');

            const tabs = [
                { id: 'intro', icon: 'ph-info', label: 'Início' },
                { id: 'mat', icon: 'ph-toolbox', label: 'Kit' }, // Rótulo encurtado para caber no telemóvel
                { id: 'alert', icon: 'ph-shield-warning', label: 'Cuidados' },
                { id: 'step', icon: 'ph-list-numbers', label: 'Coleta' },
                { id: 'time', icon: 'ph-calendar-check', label: 'Prazos' },
                { id: 'method', icon: 'ph-microscope', label: 'Análise' } // Nova aba
            ];

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col md:max-w-md md:mx-auto md:shadow-2xl md:bg-white relative pb-20">
                    
                    {/* Header */}
                    <header className="bg-white px-5 pt-8 pb-4 shadow-sm sticky top-0 z-50 rounded-b-2xl">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black tracking-tight text-eco-green flex items-center">
                                    <span className="italic">ecobhio</span>
                                    <i className="ph-fill ph-leaf text-yellow-400 ml-1 text-xl -mt-2"></i>
                                </h1>
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest font-bold ml-1">Tecnologia</span>
                            </div>
                            <div className="bg-slate-100 p-2 rounded-full cursor-pointer hover:bg-slate-200 transition">
                                <i className="ph ph-list text-xl text-slate-600"></i>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-grow p-5 overflow-y-auto hide-scrollbar">
                        {currentTab === 'intro' && <IntroScreen />}
                        {currentTab === 'mat' && <MaterialsScreen />}
                        {currentTab === 'alert' && <WarningsScreen />}
                        {currentTab === 'step' && <StepByStepScreen />}
                        {currentTab === 'time' && <TimelineScreen />}
                        {currentTab === 'method' && <MethodologyScreen />}
                    </main>

                    {/* Bottom Navigation Bar */}
                    <nav className="bg-white border-t border-slate-200 fixed bottom-0 w-full md:max-w-md pb-safe z-50 overflow-x-auto hide-scrollbar">
                        <div className="flex justify-between items-center h-16 px-1">
                            {tabs.map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${currentTab === tab.id ? 'text-eco-green' : 'text-slate-400 hover:text-slate-600'}`}
                                >
                                    <i className={`ph ${currentTab === tab.id ? tab.icon + '-fill' : tab.icon} text-2xl`}></i>
                                    <span className="text-[9px] font-bold uppercase">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* CSS Animation Inject */}
                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
                        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
                    `}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
